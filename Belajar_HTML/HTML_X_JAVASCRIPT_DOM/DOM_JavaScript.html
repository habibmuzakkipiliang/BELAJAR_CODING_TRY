<!DOCTYPE html>
<html>
 <head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Latihan JavaScript DOM</title>
 </head>
 
 <style>
 .body {
  font-size: 20px;
  font-family: Sans-Serif;
  background-color: aqua;
  color: black;
  line-height: 3.5em;
 }
 
 .header {
  background-color: yellow;
  color: black;
  font-family: Sans-Serif;
  line-height: 3.5em;
  
 }
 </style>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
 
 
 <body class="body">
  <header class="header p-5 mb-5">
   <h1 align="center">Latihan JavaScript DOM</h1>
  </header>
  
  <div class="container">
   <div class="row">
    <div class="col-sm-12" style="background-color: white;">
     
     <p>
         Halo saya lagi belajar JavaScript dan DOM JavaScript
     </p>
     
     
     <div id="judul"></div>
     
     <div id="teks"></div>
     
     <script>
         
         var teks = document.getElementById ("teks")
         var judul = document.getElementById ("judul")
         
         judul.innerHTML += "<h2> Profil Habib Muzakki </h2>"

         var nama = "Habib Muzakki"
         var kelas = "12 Agama"
         var absen = 15
         var coding = "HTML, CSS, JavaScript, Python"
         var sekolah = "MAN 2 KOTA SERANG"
         var tinggi = "170 cm"
         var berat = "60 kg"
         var lomba = "Finalis OSN-K Informatika"
         
         
         
         var profil = `
         
         <br>- Nama  : ${nama}
         <br>- Kelas : ${kelas}
         <br>- Absen : ${absen}
         <br>- Coding : ${coding}
         <br>- Sekolah : ${sekolah}
         <br>- Tinggi badan : ${tinggi}
         <br>- Berat badan : ${berat}
         <br>- Lomba : ${lomba}
        
         `
         
         document.write (profil)
         
         teks.innerHTML += "Maaf aku lagi latihan bikin DOM JavaScript"
         
         
         
         teks.innerHTML += "<hr>"
         
         
         
         judul.innerHTML += "<h2> Percabangan Dasar </h2>"
         
        
         
         var nilai = 9
         
         if (nilai > 5) {
             teks.innerHTML += `Besar, nilai = ${nilai}`
         }
         
         else {
             teks.innerHTML += `Kecil, nilai = ${nilai}`
         }
         
         
         teks.innerHTML += "<hr>"
         
         
         
         
         judul.innerHTML += "<h2> Percabangan Nested </h2>"
         
         
         var skor = 60
         var cek = true
         
         
         if (cek) {
             if (skor > 50) {
                 teks.innerHTML += `Besar, nilai = ${skor}`
             }
             
             else if (skor < 50) {
                 teks.innerHTML += `Kecil, nilai = ${skor}`
             }
         }
         
         else {
             teks.innerHTML += `Sama saja, nilai = ${skor}`
         }
         
         
         teks.innerHTML += "<hr>"
     </script>
     
    </div>
   </div>
  </div>
  
  
 </body>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
