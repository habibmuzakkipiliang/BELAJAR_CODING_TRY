    <script>
     document.write ("<h2> Operator Dasar </h2>")

     var x = 40
     var y = 2

     document.write ("<br> Tambah = ", x + y)
     document.write ("<br> Kurang = ", x - y)
     document.write ("<br> Kali = ", x * y)
     document.write ("<br> Pangkat = ", x ** y)
     document.write ("<br> Bagi = ", x / y)
     document.write ("<br> Modulus = ", x % y)

     document.write ("<hr>")


     document.write ("<br> <h2> Operator Perbandingan </h2>")

     document.write ("<br> Hasil = ", x > y)
     document.write ("<br> Hasil = ", x < y)
     document.write ("<br> Hasil = ", x <= y)
     document.write ("<br> Hasil = ", x >= y)
     document.write ("<br> Hasil = ", x == y)
     document.write ("<br> Hasil = ", x != y)

     document.write ("<hr>")


     document.write ("<br> <h2> Operator Logika </h2>")

     document.write ("<br> Hasil = ", (x > y) && (x < y))
     document.write ("<br> Hasil = ", (x < y) || (x > y))
     document.write ("<br> Hasil = ", (!x))
     document.write ("<br> Hasil = ", (!y))
    </script>

    <script>

     document.write ("<h2> For dasar </h2>")
      
     for (a = 0; a < 11; a++) {
      document.write (`<br> Urutan ke - ${a}`)
     }

     document.write ("<hr>")


     for (b = 0; b < 21; b++) {
      document.write (`<br> Urutan ke - ${b}`)
     }
    </script>
    <hr>

    <script>
     document.write ("<h2> While dasar </h2>")

     var f = 10

     while (f < 21) {
      document.write (`<br> Urutan ke - ${f}`)
      f++
     }

     document.write ("<hr>")


     var e = 30

     while (e < 41) {
      document.write (`<br> Urutan ke - ${e}`)
      e++
     }

    </script>
    <hr>
    <br>


    <script>
     document.write ("<h2> Do While </h2>")

     var w = 5

     do {
      document.write (`<br> Urutan ke - ${w}`)
      w++
     } while (w < 11)

     document.write ("<hr>")


     var o = 10

     do {
      document.write (`<br> Urutan ke - ${o}`)
      o++
     } while (o < 26)

    </script>
    <hr>
    <br>


    <script>

        document.write (`<br> Urutan ke - ${a}, urutan ke - ${b}, urutan ke - ${c}`)
