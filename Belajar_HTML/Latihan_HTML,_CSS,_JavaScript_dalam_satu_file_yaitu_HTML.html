<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan HTML, CSS, JavaScript dalam satu file yaitu HTML</title>
  </head>

  <style>
    .body {
      background-color: aqua;
      color: black;
      line-height: 3.5em;
      font-family: sans-serif;
      font-size: 20px;
    }

    .header {
      background-color: yellow;
      color: black;
      line-height: 3.5em;
      font-family: sans-serif;
    }
  </style>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
  <body class="body">
    <header class="header p-5 mb-5">
      <h1 align="center">
        Latihan HTML, CSS, JavaScript dalam satu file yaitu HTML
      </h1>
    </header>

    <div class="container">
      <div class="row">
        <div class="col-sm-12" style="background-color: white">
          <h2>Profil Habib Muzakki</h2>
          <img
            src="https://habibmuzakkipiliang.github.io/website_portofolio/Leonardo_Phoenix_Design_a_cuttingedge_logo_for_HM_that_embodie_0.jpg"
            alt="Gambar logo Habib Muzakki"
            height="200px"
            width="200px"
            class="img-fluid rounded-circle"
          />
          <br />

          <script>
            var nama = "Habib Muzakki";
            var panggil = "Habib";
            var marga = "Piliang";
            var suku = "Minangkabau";
            var kelas = "12 Agama (Keagamaan)";
            var absen = "15";
            var umur = "19 tahun";
            var coding = "HTML, CSS, JavaScript dan Python";
            var lomba = "Finalis OSN-K Informatika tahun 2025";
            var asal = "Kota Serang, Provinsi Banten";
            var tinggi = "162 cm";
            var berat = "60 kg";
            var darah = "B";
            var jenis = "Pria";
            var fans = "JKT48, AKB48, Hearts2Hearts, Raintree";
            var oshi = [
              "<br> 1. Michie JKT48 (UTAMA)",
              "<br> 2. Fritzy JKT48 (UTAMA)",
              "<br> 3. Anindya JKT48 (UTAMA)",
              "<br> 4. Christy JKT48 (UTAMA)",
              "<br> 5. Carmen Hearts2Hearts (H2H) (UTAMA)",
              "<br> 6. Freya JKT48",
              "<br> 7. Olla JKT48",
              "<br> 8. Jessi JKT48",
              "<br> 9. Fiony JKT48",
              "<br> 10. Muthe JKT48",
              "<br> 11. Marsha JKT48",
              "<br> 12. Eli JKT48",
              "<br> 13. Mikaela JKT48",
              "<br> 14. Yui Oguri (AKB48)",
              "<br> 15. Endo Rino (Rain Tree)",
            ];

            var profil = `
            
            <br>- Nama : ${nama}
            <br>- Panggil : ${panggil}
            <br>- Marga : ${marga}
            <br>- Suku : ${suku}
            <br>- Kelas : ${kelas}
            <br>- Absen : ${absen}
            <br>- Umur : ${umur}
            <br>- Coding : ${coding}
            <br>- Lomba : ${lomba}
            <br>- Asal : ${asal}
            <br>- Tinggi : ${tinggi}
            <br>- Berat : ${berat}
            <br>- Darah : ${darah}
            <br>- Jenis : ${jenis}
            <br>- Fans : ${fans}
            <br>- Oshi : 

            `;

            document.write(profil);

            for (a = 0; a < oshi.length; a++) {
              document.write(oshi[a]);
            }

            document.write("<hr>");

            document.write("Bikin Hello World");

            document.write("<br> Hello World");

            document.write("<hr>");

            document.write("Varibel dasar");

            var nama = "<br> Halo Indonesia";
            document.write(nama);

            document.write("<hr>");

            document.write("Tipe data Pemrograman");

            var teks = "Ini contoh";
            var angka = 12;
            var desimal = 44.4;
            var cek = true;
            var huruf = "A";
            var daftar = [
              "<br> 1. Buah Naga",
              "<br> 2. Buah Salak",
              "<br> 3. Buah Pepaya",
              "<br> 4. Buah Apel",
              "<br> 5. Buah Anggur",
            ];

            var detail = `

            <br>- Teks    : ${teks}
            <br>- Angka   : ${angka}
            <br>- Desimal : ${desimal}
            <br>- Cek     : ${cek}
            <br>- Huruf   : ${huruf}
            <br>- Daftar  : ${daftar}

            `;

            document.write(detail);

            for (a = 0; a < daftar.length; a++) {
              document.write(daftar[a]);
            }

            document.write("<hr>");

            document.write("Dictionary (Objek)");

            var data = {
              nama: "John Doe",
              asal: "Amerika Serikat",
              umur: "25 tahun",
              kerja: "Programmer dan Software Engineer",
            };

            document.write("<br> Nama : ", data["nama"]);

            document.write("<br> Asal : ", data["asal"]);

            document.write("<br> Umur : ", data["umur"]);

            document.write("<br> Kerja : ", data["kerja"]);

            document.write("<hr>");

            document.write("\n Operasi dasar \n");

            var x = 20;
            var y = 5;

            document.write("<br> Tambah = ", x + y);
            document.write("<br> Kurang = ", x - y);
            document.write("<br> Kali = ", x * y);
            document.write("<br> Bagi = ", x / y);
            document.write("<br> Pangkat = ", x ** y);
            document.write("<br> Modulus = ", x % y);

            document.write("<hr>");

            document.write("Operasi Perbandingan");

            document.write("<br> Hasil = ", x > y);
            document.write("<br> Hasil = ", x < y);
            document.write("<br> Hasil = ", x >= y);
            document.write("<br> Hasil = ", x <= y);
            document.write("<br> Hasil = ", x == y);
            document.write("<br> Hasil = ", x != y);

            document.write("<hr>");

            document.write("Percabangan dasar");

            var a = 9;

            if (a > 5) {
              document.write(`<br> Besar, a = ${a}`);
            } else {
              document.write(`<br> Kecil, a = ${a}`);
            }

            document.write("<hr>");

            document.write("Percabangan Lanjutan");

            var b = 3;

            if (b > 5) {
              document.write(`<br> Besar, b = ${b}`);
            } else if (b < 5) {
              document.write(`<br> Kecil, b = ${b}`);
            } else {
              document.write(`<br> Sama saja, b = ${b}`);
            }

            document.write("<hr>");

            document.write("Percabangan Nested 1");

            var nilai = 9;
            var cek = true;

            if (cek) {
              if (nilai > 5) {
                console.log(`Besar, nilai = ${nilai}`);
              } else if (nilai < 5) {
                console.log(`Kecil, nilai = ${nilai}`);
              }
            } else {
              document.write(`Sama saja, nilai = ${nilai}`);
            }

            document.write("<hr>");

            document.write("Percabangan Nested 2");

            var skor = 3;
            var cek = true;

            if (cek) {
              if (skor > 5) {
                document.write(`<br> Besar, skor = ${skor}`);
              } else {
                document.write(`<br> Kecil, skor = ${skor}`);
              }
            } else {
              document.write(`<br> Sama saja, skor = ${skor}`);
            }

            document.write("<hr>");
          </script>
        </div>
      </div>
    </div>
  </body>
